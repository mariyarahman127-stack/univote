<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UniVote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-service.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #d1fae5;
            border: 1px solid #10b981;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #065f46;
            display: none;
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #991b1b;
            display: none;
        }
        
        /* Password Toggle Styles */
        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper input { padding-right: 3rem; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #999;
            font-size: 1rem; padding: 0; line-height: 1;
        }
        .password-toggle:hover { color: #667eea; }
        .password-toggle i { display: block; }
        .password-toggle .fa-eye-slash { display: none; }
        .password-toggle.active .fa-eye { display: none; }
        .password-toggle.active .fa-eye-slash { display: block; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">
            <h1>🗳️ UniVote</h1>
            <p>Create Your Account</p>
        </div>

        <div id="success-message" class="success-message">
            Account created successfully! Redirecting to login...
        </div>
        
        <div id="error-message" class="error-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="Enter your student ID" required>
            </div>

            <div class="form-group">
                <label for="department">Department Name</label>
                <input type="text" id="department" placeholder="Enter your department name" required>
            </div>

            <div class="form-group">
                <label for="email">University Email</label>
                <input type="email" id="email" placeholder="19131@imperial.edu.bd" required>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Create a strong password" required minlength="8">
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                        <i class="fas fa-eye"></i>
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <small style="color: #666; font-size: 12px; margin-top: 5px; display: block;">
                    💡 Use at least 8 characters with uppercase, lowercase, numbers & special characters for a strong password
                </small>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)">
                        <i class="fas fa-eye"></i>
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn" id="submit-btn">
                Create Account
            </button>
        </form>

        <p class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, btn) {
            var input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.classList.add('active');
            } else {
                input.type = 'password';
                btn.classList.remove('active');
            }
        }

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value.trim();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submit-btn');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            
            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Validate student ID
            if (!studentId || studentId.length < 3) {
                errorMessage.textContent = 'Please enter a valid student ID';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate department
            const department = document.getElementById('department').value.trim();
            if (!department || department.length < 2) {
                errorMessage.textContent = 'Please enter your department name';
                errorMessage.style.display = 'block';
                return;
            }
            // Validate email format
            const emailRegex = /^[0-9]{5}@imperial\.edu\.bd$/i;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = 'Please use valid university email: 5-digitID@imperial.edu.bd';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate password match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match!';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate password strength
            const passwordErrors = [];
            if (password.length < 8) {
                passwordErrors.push('at least 8 characters');
            }
            if (!/[A-Z]/.test(password)) {
                passwordErrors.push('at least one uppercase letter');
            }
            if (!/[a-z]/.test(password)) {
                passwordErrors.push('at least one lowercase letter');
            }
            if (!/[0-9]/.test(password)) {
                passwordErrors.push('at least one number');
            }
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                passwordErrors.push('at least one special character (!@#$%^&*()_+-=[]{};\':"\\|,.<>/?)');
            }
            
            if (passwordErrors.length > 0) {
                errorMessage.textContent = 'Password must contain: ' + passwordErrors.join(', ');
                errorMessage.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            try {
                // Use Firebase Authentication
                const result = await AuthService.register(email, password, name, studentId, department);
                
                if (result.success) {
                    // Show success
                    successMessage.style.display = 'block';
                    submitBtn.textContent = 'Account Created!';
                    
                    // Show success
                    successMessage.style.display = 'block';
                    submitBtn.textContent = 'Account Created!';
                    
                    // Redirect to login after 2 seconds
                    setTimeout(function() {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    // Show error message
                    errorMessage.textContent = result.error;
                    errorMessage.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
